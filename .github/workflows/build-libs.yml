name: Build GDExtension Libraries

on:
  push:
    branches: [main]
    paths:
      - 'crates/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.github/workflows/build-libs.yml'
  workflow_dispatch:
    inputs:
      build_release:
        description: 'Build release dylib (slow, only needed for shipping)'
        type: boolean
        default: false

jobs:
  build-macos:
    name: Build macOS dylib
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Run core tests
        run: cargo test -p delphai-core

      - name: Build debug dylib
        run: cargo build -p delphai-gdext

      - name: Build release dylib
        if: github.event_name == 'workflow_dispatch' && inputs.build_release
        run: cargo build -p delphai-gdext --release

      - name: Copy to prebuilt/
        run: |
          mkdir -p prebuilt/macos/debug
          cp target/debug/libdelphai_gdext.dylib prebuilt/macos/debug/
          if [ -f target/release/libdelphai_gdext.dylib ]; then
            mkdir -p prebuilt/macos/release
            cp target/release/libdelphai_gdext.dylib prebuilt/macos/release/
          fi

      - name: Commit prebuilt dylibs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add prebuilt/macos/
          if git diff --staged --quiet; then
            echo "No dylib changes — skipping commit"
            exit 0
          fi
          git commit -m "chore: update prebuilt macos dylib [skip ci]"
          git pull --rebase origin ${{ github.ref_name }}
          git push
